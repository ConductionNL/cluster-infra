---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: cluster-infra
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  description: Cluster-wide infrastructure components (External DNS, cert-manager, etc.)

  sourceRepos:
    - "https://github.com/ConductionNL/cluster-infra.git"
    - "https://kubernetes-sigs.github.io/external-dns/"
    - "https://charts.jetstack.io"              # cert-manager (future)
    - "https://kubernetes.github.io/ingress-nginx" # ingress-nginx (future)

  destinations:
    - server: https://kubernetes.default.svc
      namespace: external-dns
    - server: https://kubernetes.default.svc
      namespace: cert-manager
    - server: https://kubernetes.default.svc
      namespace: ingress-nginx
    - server: https://kubernetes.default.svc
      namespace: kube-system

  # Cluster-wide resources that infra components need
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: storage.k8s.io
      kind: StorageClass

  # Namespace-scoped resources
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

  roles:
    - name: infra-admin
      description: Full access to cluster-infra project
      policies:
        - p, proj:cluster-infra:infra-admin, applications, *, cluster-infra/*, allow
      groups:
        - cluster-admins

  # No sync windows – cluster-infra has no client-facing workloads and can
  # be updated at any time. Deployment governance lives in Nextcloud-base.
