---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: storage
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: cluster-infra
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: cluster-infra

  source:
    repoURL: "https://github.com/ConductionNL/cluster-infra.git"
    targetRevision: HEAD
    path: storage

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m

  revisionHistoryLimit: 5
