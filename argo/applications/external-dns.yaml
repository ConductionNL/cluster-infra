---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: cluster-infra
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: cluster-infra

  sources:
    # External DNS Helm chart
    - repoURL: "https://kubernetes-sigs.github.io/external-dns/"
      chart: external-dns
      targetRevision: "1.15.0"
      helm:
        releaseName: external-dns
        valueFiles:
          - "$values/external-dns/values.yaml"

    # Values from this repo
    - repoURL: "https://github.com/ConductionNL/cluster-infra.git"
      targetRevision: HEAD
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: external-dns

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m

  revisionHistoryLimit: 5
